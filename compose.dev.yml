# Local-development overrides — layered on top of `docker-compose.yml`
# when you run `make dev` (which uses `-f docker-compose.yml -f compose.dev.yml`).
#
# DOKPLOY DOES NOT READ THIS FILE. Production deploys see only
# `docker-compose.yml`, which stays strict (every secret is
# `${VAR:?required}` — a missing env aborts the deploy). This overlay
# does two things for the laptop:
#
#   1. Binds every backend port to localhost so you can hit each
#      service directly from your IDE / curl / `pnpm dev` server.
#   2. Provides dev fallbacks for the env vars `docker-compose.yml`
#      requires, so `make dev` works without setting them first.
#
# To run prod-shape locally (strict, no overlay):
#   docker compose -f docker-compose.yml up

services:
  # In prod, Traefik routes /api, /connection/websocket, /chatapp on the
  # same origin as the UI — so the browser uses relative paths. Locally
  # there's no Traefik, so the browser has to be told the absolute URLs
  # of each backend port. NEXT_PUBLIC_* are baked at build time, so
  # they're passed as build args here (not runtime env).
  web:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        NEXT_PUBLIC_CENTRIFUGO_URL: ws://localhost:8000/connection/websocket

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp}
    # All dev port bindings are pinned to 127.0.0.1 so backing services
    # (Postgres, Redis, MinIO, Centrifugo admin) are reachable only from
    # the developer's machine — never from the LAN / public Wi-Fi the
    # laptop happens to be on.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"

  centrifugo:
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_SECRET:-dev-secret-change-in-production}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:-dev-api-key}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD:-admin}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-dev-admin-secret}
    ports:
      - "127.0.0.1:${CENTRIFUGO_HOST_PORT:-8000}:8000"

  minio:
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatapp-dev-only}
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"

  server:
    ports:
      - "127.0.0.1:${SERVER_HOST_PORT:-3001}:3001"
    environment:
      # Fallbacks for the vars `docker-compose.yml` now marks
      # `${VAR:?required}`. Without these, `make dev` would refuse to
      # boot if your root `.env` was empty or missing one of them.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-dev-api-key}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET:-dev-secret-change-in-production}

      # Loud-failure overrides relaxed for the laptop. Mirror these in
      # Dokploy's panel for prod (they're already strict there).
      MASTER_API_KEY: ${MASTER_API_KEY:-dev-master-key-laptop-only}
      DEV_MINT_ENABLED: ${DEV_MINT_ENABLED:-true}
      ALLOW_DEV_MINT_TENANTS: ${ALLOW_DEV_MINT_TENANTS:-default,demo_acme,demo_beta}
      WEBHOOK_SIGNATURE_REQUIRED: ${WEBHOOK_SIGNATURE_REQUIRED:-false}

      # Dev URLs that differ from prod. In prod the API + storage live
      # on the same origin as the UI via Traefik; locally they're on
      # separate host-bound ports, so we override the URLs the server
      # generates. Hard-coded (no `${VAR:-…}`) so even a stale value in
      # root `.env` (e.g. S3_PUBLIC_URL_BASE pointing at localhost:3000
      # from the old proxy days) can't break dev.
      S3_PUBLIC_URL_BASE: http://localhost:9000/chatapp
      OPENAPI_SERVER_URL: http://localhost:3001/api

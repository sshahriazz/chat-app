# Full-stack compose used by Dokploy for deployment.
#
# Network topology — every container talks over the internal compose
# network. Public ingress is handled by Dokploy's Traefik, which
# routes paths on `chat.technext.it` (or whatever host you configure)
# directly to the matching container based on Domain entries in the
# Dokploy UI. The expected entries are:
#
#   chat.technext.it /                     → web        :3000  (UI)
#   chat.technext.it /api                  → server     :3001  (REST)
#   chat.technext.it /connection/websocket → centrifugo :8000  (realtime WS)
#   chat.technext.it /chatapp              → minio      :9000  (attachments)
#
# Each container is reached *directly* via Traefik — `web` is no
# longer in the request path for `/api`, `/connection/websocket`, or
# `/chatapp`. That decoupling means:
#   - third-party integrators can hit the API + realtime without
#     depending on the chat-app's own UI container,
#   - `web` redeploys don't take down the API or realtime,
#   - swapping the realtime backend (Centrifugo → something else) is
#     a Traefik-route change, not a Next.js code change.
#
# All services share `dokploy-network` so they can resolve each other
# by compose service name (`server`, `redis`, `minio`, …). Dokploy's
# Traefik lives on that same network; whichever services get Domain
# entries via the Dokploy UI become publicly routable — everyone else
# stays internal.
networks:
  dokploy-network:
    external: true

services:
  # ─── Postgres (INTERNAL) ─────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      # POSTGRES_PASSWORD is required (no `:-fallback`) — a missing
      # value would let postgres init with `chatapp`, which is a
      # publicly known dev default. The dev overlay (compose.dev.yml)
      # supplies a fallback for the laptop.
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatapp} -d ${POSTGRES_DB:-chatapp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis (INTERNAL) ────────────────────────────────────────
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    networks: [dokploy-network]
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Centrifugo (INTERNAL — browser reaches via /connection/websocket on web) ─
  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    networks: [dokploy-network]
    volumes:
      - ./centrifugo.json:/centrifugo/config.json:ro
    # Centrifugo v6's env-var parser doesn't split slice values on
    # commas (whole string → 1-element array). JSON-in-env doesn't
    # work either (whole `[…]` string → 1-element array containing the
    # brackets). Indexed env vars (CENTRIFUGO_CLIENT_ALLOWED_ORIGINS_0,
    # _1, …) are explicitly rejected: Centrifugo logs them as "unknown
    # var in environment" and ignores them.
    #
    # So we patch the mounted config.json with a JSON array built from
    # comma-separated CORS_ALLOWED_ORIGINS at startup, write the result
    # to a writable path, and start Centrifugo with that file. The env
    # var is then unset so Centrifugo's override logic doesn't undo
    # what we just patched in.
    command:
      - sh
      - -c
      - |
        if [ -n "$$CENTRIFUGO_CLIENT_ALLOWED_ORIGINS" ]; then
          ORIGINS_JSON=$$(echo "$$CENTRIFUGO_CLIENT_ALLOWED_ORIGINS" | awk -F, '{printf "["; for(i=1;i<=NF;i++) {gsub(/^ +| +$$/, "", $$i); printf "%s%c%s%c", (i>1?",":""), 34, $$i, 34} printf "]"}')
          sed "s|\"allowed_origins\":[[:space:]]*\[[^]]*\]|\"allowed_origins\": $$ORIGINS_JSON|" /centrifugo/config.json > /tmp/centrifugo.json
        else
          cp /centrifugo/config.json /tmp/centrifugo.json
        fi
        unset CENTRIFUGO_CLIENT_ALLOWED_ORIGINS
        exec centrifugo -c /tmp/centrifugo.json
    environment:
      # Centrifugo env vars override matching keys in the config JSON.
      # Keeping secrets in env (driven by the root `.env`) means the
      # committed `centrifugo.json` only holds non-sensitive structure
      # (namespaces, engine choice, etc) and Dokploy rotates secrets
      # without editing the file.
      # No `:-fallback` on secrets — if the env var is unset, compose
      # interpolation produces an empty string and Centrifugo refuses to
      # boot. That's the intended behavior: a misconfigured deploy fails
      # loudly instead of silently authenticating against a dev secret.
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_SECRET:?CENTRIFUGO_TOKEN_SECRET is required}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD:?CENTRIFUGO_ADMIN_PASSWORD is required}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:?CENTRIFUGO_ADMIN_SECRET is required}
      # Must include the browser-facing origin — Centrifugo rejects the
      # WebSocket upgrade otherwise, breaking presence + live events.
      # Falls back to BETTER_AUTH_URL for the same reason as the server's
      # CORS allowlist.
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-${BETTER_AUTH_URL:-http://localhost:3000}}
      # Postgres consumer — picks outbox rows off the chat_outbox table
      # and publishes to the matching channels. DSN built from the same
      # POSTGRES_* vars the server uses; sslmode=disable skips the
      # useless TLS negotiation attempt on the internal compose network.
      # Centrifugo 6 treats CENTRIFUGO_CONSUMERS as a JSON-encoded
      # override of the top-level `consumers` array — this wins over any
      # definition in centrifugo.json.
      CENTRIFUGO_CONSUMERS: '[{"name":"postgresql","type":"postgresql","enabled":true,"postgresql":{"dsn":"postgres://${POSTGRES_USER:-chatapp}:${POSTGRES_PASSWORD:-chatapp}@postgres:5432/${POSTGRES_DB:-chatapp}?sslmode=disable","outbox_table_name":"chat_outbox","num_partitions":1,"partition_select_limit":100,"partition_poll_interval":"300ms","partition_notification_channel":"centrifugo_partition_change"}}]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── MinIO (INTERNAL — browser reaches via /chatapp/* on web) ─
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatapp}
      # MINIO_ROOT_PASSWORD is required (no `:-fallback`). The well-
      # known dev default `chatapp-dev-only` is fine for the laptop
      # via compose.dev.yml but would be catastrophic in prod.
      # Must be ≥ 8 chars.
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    networks: [dokploy-network]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-chatapp} ${MINIO_ROOT_PASSWORD:-chatapp-dev-only} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-chatapp} &&
      mc anonymous set download local/${MINIO_BUCKET:-chatapp} &&
      echo '[minio-init] bucket ready'
      "
    restart: "no"

  # ─── Prisma migrations (one-shot, INTERNAL) ──────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    restart: "no"
    networks: [dokploy-network]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatapp}:${POSTGRES_PASSWORD:-chatapp}@postgres:5432/${POSTGRES_DB:-chatapp}

  # ─── Server / Express (INTERNAL) ─────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    networks: [dokploy-network]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      TZ: UTC
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatapp}:${POSTGRES_PASSWORD:-chatapp}@postgres:5432/${POSTGRES_DB:-chatapp}
      REDIS_URL: redis://redis:6379
      # The server's public base URL (used for OpenAPI server listing +
      # absolute-URL links). Required — wrong value breaks OpenAPI's
      # "Try it" + any feature that emits absolute links.
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL is required}
      CENTRIFUGO_URL: http://centrifugo:8000
      # Centrifugo creds — must match what centrifugo.json/env give the
      # centrifugo container. Required for token mint + publish.
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET:?CENTRIFUGO_TOKEN_SECRET is required}
      # Required — wrong allowlist either rejects every legit user (too
      # strict) or opens CORS/WS to attackers (too loose). No silent
      # fallback to PUBLIC_URL.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      # Two proxy hops in the Dokploy/compose deploy: Traefik → web (Next)
      # → server. `trust proxy: 2` makes Express honor X-Forwarded-* and
      # report req.ip as the real client — critical for rate limiting
      # + admin IP allowlist enforcement.
      TRUST_PROXY: ${TRUST_PROXY:-2}
      # Tenancy admin gate. Unset → admin endpoints return 403.
      # Rotate in Dokploy env when bootstrapping real tenants.
      MASTER_API_KEY: ${MASTER_API_KEY:-}
      # Base URL that Scalar's "Try it" prepends to every OpenAPI path.
      # Unset → falls back to `${PUBLIC_URL}/api`. Set to
      # `https://<host>/chat-api` when deploying behind a strip-prefix
      # ingress so the docs' Try-It buttons hit the right URL.
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-}
      # Optional comma-separated CIDR / IP list. When set, `/api/admin/*`
      # requests from outside this list are rejected with 403 even if
      # they present a valid MASTER_API_KEY. Defense-in-depth against
      # key leaks. Leave unset to allow admin from any source.
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      TENANT_JWT_CLOCK_SKEW_SEC: ${TENANT_JWT_CLOCK_SKEW_SEC:-30}
      AUTH_MODE: ${AUTH_MODE:-jwt}
      # Dev-only shortcut that mounts POST /api/dev/mint-token. Safe
      # defaults: OFF. Local dev should set DEV_MINT_ENABLED=true +
      # ALLOW_DEV_MINT_TENANTS=default via a .env.dev (never in prod).
      DEV_MINT_ENABLED: ${DEV_MINT_ENABLED:-false}
      ALLOW_DEV_MINT_TENANTS: ${ALLOW_DEV_MINT_TENANTS:-}
      # Optional: base64-encoded 32-byte key that wraps Tenant.jwtSecret
      # at rest (AES-256-GCM). If unset, secrets are stored plaintext
      # (HMAC requires plaintext at verify time, so this is a DB-at-rest
      # defense — unwrap happens in memory only). Existing plaintext
      # rows are still readable; new writes go through the wrap.
      JWT_SECRET_ENCRYPTION_KEY: ${JWT_SECRET_ENCRYPTION_KEY:-}
      # Optional: if "true", every POST /api/webhooks/* must carry a
      # valid X-Chat-Signature header (HMAC-SHA256 of the raw body
      # signed with the tenant's apiKey). Off by default so existing
      # tenants don't break; flip on once your tenants ship the signer.
      WEBHOOK_SIGNATURE_REQUIRED: ${WEBHOOK_SIGNATURE_REQUIRED:-false}
      # S3 split clients (see apps/server/src/lib/s3.ts):
      #   S3_ENDPOINT        — internal, used for HEAD/DELETE/etc.
      #   S3_PUBLIC_URL_BASE — public, used to mint presigned PUT/GET
      #                        URLs that the browser can actually reach
      #                        (routed back to MinIO via web's /chatapp
      #                        rewrite). Must include the bucket name.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${MINIO_BUCKET:-chatapp}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-chatapp}
      # Required — derived from MINIO_ROOT_PASSWORD (which is already
      # `:?required` above). Listed for documentation.
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Required — where the browser PUTs/GETs attachments. Presigned
      # URLs are signed against this host (apps/server/src/lib/s3.ts).
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:?S3_PUBLIC_URL_BASE is required}
      # Web Push (optional — endpoints 503 if unset)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}

  # ─── Web / Next.js (UI only — pure presentation layer) ───────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Client-bundle env (browser-facing). Empty defaults make the
        # browser use same-origin relative paths; Traefik handles
        # routing `/api`, `/connection/websocket`, and `/chatapp` to
        # the right backend container.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_CENTRIFUGO_URL: ${NEXT_PUBLIC_CENTRIFUGO_URL:-}
    restart: unless-stopped
    networks: [dokploy-network]
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:

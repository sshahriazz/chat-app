services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
      POSTGRES_DB: chatapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    # AOF + fsync-every-second keeps rate-limit counters durable across
    # restarts at the cost of one extra write per request, which is
    # negligible for this workload.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
  centrifugo:
    image: centrifugo/centrifugo:v6
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/config.json:ro
    command: centrifugo -c config.json

volumes:
  postgres_data:
  redis_data:

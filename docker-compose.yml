services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
      POSTGRES_DB: chatapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    # AOF + fsync-every-second keeps rate-limit counters durable across
    # restarts at the cost of one extra write per request, which is
    # negligible for this workload.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  centrifugo:
    image: centrifugo/centrifugo:v6
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/config.json:ro
    command: centrifugo -c config.json
    depends_on:
      redis:
        condition: service_healthy

  # ─── MinIO: S3-compatible object storage ─────────────────────
  #
  # Local dev substitute for AWS S3 / Cloudflare R2. The existing
  # `apps/server/src/lib/s3.ts` talks to any S3-compatible endpoint when
  # `S3_ENDPOINT` is set — no server-code changes needed.
  #
  # Set in apps/server/.env (overwriting the R2 placeholder values):
  #   S3_ENDPOINT=http://localhost:9000
  #   S3_REGION=us-east-1
  #   S3_BUCKET=chatapp
  #   S3_ACCESS_KEY_ID=chatapp
  #   S3_SECRET_ACCESS_KEY=chatapp-dev-only
  #   S3_PUBLIC_URL_BASE=http://localhost:9000/chatapp
  #
  # Console available at http://localhost:9001 (login chatapp/chatapp-dev-only).
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    environment:
      MINIO_ROOT_USER: chatapp
      # Must be ≥ 8 chars — MinIO rejects shorter passwords at boot.
      MINIO_ROOT_PASSWORD: chatapp-dev-only
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot: create the `chatapp` bucket and set it anonymously readable
  # so the attachment URLs embedded in message events (served as image src
  # by the browser) resolve without signing. Uploads still require a
  # presigned PUT; only GETs are public.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 chatapp chatapp-dev-only &&
      mc mb --ignore-existing local/chatapp &&
      mc anonymous set download local/chatapp &&
      echo '[minio-init] bucket ready'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
